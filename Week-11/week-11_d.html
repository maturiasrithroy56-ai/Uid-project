<!DOCTYPE html>
<html>
<head>
<title>Mobile Number Validation</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#46fcd5,#46fcd5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
input{
width:100%;
padding:10px;
margin-top:10px;
}
p{
font-size:18px;
}
</style>
</head>
<body>
<div class="card">
<h2>Mobile Number Validation</h2>
<input type="text" id="mobile" placeholder="Enter Mobile Number" onblur="validateMobile()">
<p id="msg"></p>
</div>
<script>
function validateMobile(){
let num=document.getElementById("mobile").value;
let msg=document.getElementById("msg");
let pattern=/^[0-9]{10}$/;
if(pattern.test(num)){
msg.innerText="Valid Mobile Number";
msg.style.color="green";
}
else{
msg.innerText="Invalid Mobile Number";
msg.style.color="red";
}
}
</script>
</body>
</html>
