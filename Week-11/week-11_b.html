<html> 
<head> 
<title>Email Verifier</title> 
<style> 
body{
    margin:0;
    font-family:Arial;
    background:#065f46;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
} 
.card{
    background:#10b981;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
} 
h2{
    color:white;
}
input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
} 
input{
    background:#d1fae5;
}
button{
    background:#065f46;
    color:white;
    cursor:pointer;
} 
button:hover{
    background:#044e3b; /* darker same color */
}
</style> 
</head> 
<body> 
<div class="card"> 
<h2>Email Required</h2> 
<form onsubmit="return validateEmail()"> 
<input type="email" id="email" placeholder="Kindly enter your email"> 
<button type="submit">Submit</button> 
</form> 
</div> 
<script> 
function validateEmail(){ 
    let email=document.getElementById("email").value; 
    let pattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/; 
    if(pattern.test(email)){ 
        alert("Email is valid"); 
        return true; 
    }else{ 
        alert("Invalid Email"); 
        return false; 
    } 
} 
</script> 
</body> 
</html>
